<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <a href="{% url 'upload_image' %}" class="logo"><img src="{% static 'static\css\images\logo.png' %}" alt="Logo"></a>
                <ul>
                    <li><a href="{% url 'upload_image' %}">Upload Another Image</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <h1>Generated Response</h1>
            <div class="result">
                <!-- Render the formatted response with HTML content -->
                <div class="response-content">{{ response|safe }}</div>
            </div>
            <a href="{% url 'upload_image' %}" class="btn btn-primary">Upload Another Image</a>
        </main>
    </div>
</body>
</html>
